<!doctype html>
<html lang="en">
  <head>
    <script defer src="https://cloud.umami.is/script.js" data-website-id="2cb0cf37-84b9-444d-9bcb-e6938a10a9cb"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome | Cite a Website</title>
    <link rel="icon" type="image/png" href="./assets/icon-32.png" />
    <link rel="stylesheet" href="./welcome.css" />
  </head>
  <body>
    <div class="page">
      <h1 class="install-title">
        <img
          class="install-title__icon"
          src="./assets/icon-32.png"
          width="32"
          height="32"
          alt=""
        />
        <span class="install-title__name">Cite a Website</span>
        <span class="install-title__installed">Installed</span>
      </h1>

      <ol class="steps">
        <li class="step" aria-label="Steps 1 and 2">
          <div class="step-head">
            <span class="step-num step-num--range" aria-hidden="true">1–2</span>
            <div class="step-text">
              <h2>Click the puzzle piece, then pin Cite a Website</h2>
            </div>
          </div>
          <div class="step-visual">
            <img
              class="step-screenshot step-screenshot--setup"
              src="./assets/steps1and2.png"
              width="4800"
              height="1488"
              alt="Chrome: click the puzzle piece (1), then pin Cite a Website (2)"
            />
          </div>
        </li>

        <li class="step" aria-label="Step 3">
          <div class="step-head">
            <span class="step-num" aria-hidden="true">3</span>
            <div class="step-text">
              <h2>Click the icon on any page to cite it</h2>
            </div>
          </div>
          <div class="step-visual">
            <img
              class="step-screenshot step-screenshot--click"
              src="./assets/step3.png"
              width="4800"
              height="1488"
              alt="Chrome: click the icon in the toolbar on any page to cite it"
            />
          </div>
        </li>
      </ol>
    </div>
  </body>
</html>
